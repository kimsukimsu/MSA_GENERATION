# MSAFlow SFM Decoder training configuration
# Matches paper Section 6.8.2: 129M params, 7 epochs, 4×H200, LR 1e-5

model:
  vocab_size: 22          # 20 AA + gap + X
  msa_dim: 128            # AF3 compressed MSA embedding dim
  hidden_size: 768        # DiT hidden dim
  depth: 12               # Number of transformer blocks
  num_heads: 12           # Attention heads
  mlp_ratio: 4.0
  max_seq_len: 1024

data:
  lmdb_path: /gpfs/deepfold/users/yjlee4/msaflow_merged.lmdb
  n_seqs_per_msa: 32      # Sequences sampled per MSA (paper: 32)
  max_seq_len: 1024
  batch_size: 1           # Per-GPU batch (number of MSAs) — reduced from 4 to avoid OOM
  num_workers: 4

training:
  epochs: 7
  lr: 1.0e-5
  weight_decay: 0.1
  warmup_steps: 5000
  max_grad_norm: 1.0
  grad_accumulation: 4
  seed: 42
  output_dir: /runs/decoder
  resume: false
  log_every: 100
  ema_decay: 0.9999
  use_ema: true
  mixed_precision: "bf16"
  use_wandb: true
  wandb_project: msaflow
  wandb_run_name: decoder_d12_h768_lr1e5_fixloss_v3
  val_every: 1          # validate every N epochs (0 = disabled)
  val_ode_steps: 100    # Euler steps for ODE integration (paper: Δt=0.01 = 100 steps)
  t_max_eps: 0.01       # time truncation: t ∈ [0, 1-t_max_eps] to avoid log_map instability near t=1
                        # 0.01 → training covers [0, 0.99], matching inference Euler max t=(n_steps-1)/n_steps=0.99
